<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Odin Tic Tac Toe</title>
  <link rel="stylesheet" href="./josh-comeau-reset.css" type="text/css">
  <link rel="stylesheet" href="./style.css" type="text/css">
  <script src="./script.js" defer="defer"></script>
</head>

<body>
  <div class="container">
    <div class="game-container">
      <div id="status"></div>
      <div class="disabled" id="board"></div>
    </div>
    <div class="interaction-container">
      <div class="player-names">
        <label for="player-one">Player 1 &lpar;X&rpar; Name</label>
        <input type="text" id="player-one" placeholder="Player 1">
        <label for="player-two">Player 2 &lpar;O&rpar; Name</label>
        <input type="text" id="player-two" placeholder="Player 2">
      </div>
      <button id="start-restart">Start</button>
      <div class="scoreboard">
        <div>
          <p id="player-one-name">Player 1</p>
          <p id="player-one-score">0</p>
        </div>
        <div>vs.</div>
        <div>
          <p id="player-two-name">Player 2</p>
          <p id="player-two-score">0</p>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
